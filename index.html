<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Security headers via meta (supplement with server headers in production) -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https: http:; img-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>JSON Tools - All In One JSON</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d1a;
      --surface: #11142a;
      --surface2: #191d35;
      --border: #252a48;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-glow: rgba(99,102,241,.3);
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
      --text: #e4e6f8;
      --text-muted: #767fa8;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,.5);
      --shadow-sm: 0 2px 14px rgba(0,0,0,.35);
      --t: color .2s, background-color .2s, border-color .2s, box-shadow .2s;
      color-scheme: dark;
    }

    body.light {
      --bg: #eef0ff;
      --surface: #ffffff;
      --surface2: #f3f4ff;
      --border: #d5d9f5;
      --text: #191b30;
      --text-muted: #5e66a0;
      --shadow: 0 8px 32px rgba(99,102,241,.13);
      --shadow-sm: 0 2px 14px rgba(99,102,241,.09);
      --accent-glow: rgba(99,102,241,.18);
      color-scheme: light;
    }

    ::selection { background: var(--accent-glow); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 55% at 50% -8%, rgba(99,102,241,.14) 0%, transparent 68%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: var(--t);
    }
    body.light {
      background-image: radial-gradient(ellipse 80% 55% at 50% -8%, rgba(99,102,241,.08) 0%, transparent 68%);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 50;
      transition: var(--t);
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border-radius: 10px;
      display: grid; place-items: center;
      font-weight: 900; font-size: 13px; color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    header h1 span { font-size: 0.78rem; font-weight: 400; color: var(--text-muted); margin-left: 6px; letter-spacing: 0; }
    .header-spacer { flex: 1; }
    #themeToggle { font-size: 1rem; padding: 6px 10px; line-height: 1; border-radius: 9px; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px;
      gap: 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      padding: 8px 18px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .12s, box-shadow .15s, border-color .15s, color .15s;
      letter-spacing: 0.01em;
    }
    button:active { transform: scale(0.95) !important; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      box-shadow: 0 2px 14px var(--accent-glow);
    }
    .btn-primary:hover {
      box-shadow: 0 4px 24px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* ── Colorful action buttons ── */
    .btn-indigo  { --c1:#6366f1; --c2:#818cf8; --glow:rgba(99,102,241,.35); }
    .btn-sky     { --c1:#0ea5e9; --c2:#38bdf8; --glow:rgba(14,165,233,.35); }
    .btn-emerald { --c1:#10b981; --c2:#34d399; --glow:rgba(16,185,129,.35); }
    .btn-amber   { --c1:#d97706; --c2:#f59e0b; --glow:rgba(217,119,6,.35); }
    .btn-orange  { --c1:#ea580c; --c2:#f97316; --glow:rgba(234,88,12,.35); }
    .btn-purple  { --c1:#9333ea; --c2:#a855f7; --glow:rgba(147,51,234,.35); }
    .btn-pink    { --c1:#db2777; --c2:#ec4899; --glow:rgba(219,39,119,.35); }
    .btn-teal    { --c1:#0d9488; --c2:#14b8a6; --glow:rgba(13,148,136,.35); }

    .btn-indigo, .btn-sky, .btn-emerald, .btn-amber,
    .btn-orange, .btn-purple, .btn-pink, .btn-teal {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 12px var(--glow);
    }
    .btn-indigo:hover, .btn-sky:hover, .btn-emerald:hover, .btn-amber:hover,
    .btn-orange:hover, .btn-purple:hover, .btn-pink:hover, .btn-teal:hover {
      filter: brightness(1.12);
      box-shadow: 0 4px 20px var(--glow);
      transform: translateY(-1px);
      color: #fff;
      border-color: transparent;
    }

    .btn-danger {
      background: transparent;
      color: var(--error);
      border-color: var(--border);
    }
    .btn-danger:hover { background: rgba(239,68,68,.1); border-color: var(--error); }

    .btn-sm {
      padding: 5px 11px;
      font-size: 0.77rem;
    }

    .spacer { flex: 1; }

    /* ── Editor area ── */
    .editors {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0 14px;
      flex: 1;
      align-items: stretch;
    }

    .middle-actions {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
    }
    .middle-actions button { white-space: nowrap; font-size: 0.81rem; }
    .middle-actions .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 6px 0;
    }

    @media (max-width: 768px) {
      .editors { grid-template-columns: 1fr; }
      .middle-actions {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .middle-actions .divider { display: none; }
      main { padding: 16px; }
    }

    .pane {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--t);
    }

    .pane-header {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      gap: 10px;
      font-size: 0.71rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      transition: var(--t);
    }

    .pane-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .pane-header .dot.green { background: var(--success); }
    .pane-header .dot.red { background: var(--error); }
    .pane-header .dot.yellow { background: var(--warn); }

    .pane-actions { margin-left: auto; display: flex; gap: 6px; }

    textarea, .output-area {
      flex: 1;
      min-height: 340px;
      padding: 16px;
      background: transparent;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.7;
      border: none;
      outline: none;
      resize: none;
      tab-size: 2;
      white-space: pre;
      overflow: auto;
      transition: color .2s;
    }

    .output-area {
      cursor: default;
      word-break: break-word;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 28px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.76rem;
      color: var(--text-muted);
      transition: var(--t);
    }

    #statusMsg {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    #statusMsg.ok { color: var(--success); }
    #statusMsg.err { color: var(--error); }
    #statusMsg.info { color: var(--accent); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge.success { background: rgba(34,197,94,.15); color: var(--success); }
    .badge.error   { background: rgba(239,68,68,.15);  color: var(--error);   }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(14px) scale(0.95);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
      box-shadow: var(--shadow);
    }
    #toast.show { opacity: 1; transform: translateY(0) scale(1); }

    /* ── Line numbers hint ── */
    .line-count {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* ── Per-pane Find / Replace bar ── */
    .find-bar {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .find-bar.visible { display: flex; }
    .find-bar label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .find-bar input {
      flex: 1;
      min-width: 90px;
      padding: 5px 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color 0.15s;
    }
    .find-bar input:focus { border-color: var(--accent); }
    .find-bar input::placeholder { color: var(--text-muted); }
    .find-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      min-width: 64px;
    }
    mark.highlight {
      background: rgba(245,158,11,.35);
      color: inherit;
      border-radius: 2px;
    }

    /* ── Input textarea highlight backdrop ── */
    .input-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .input-backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.7;
      white-space: pre;
      tab-size: 2;
      overflow: hidden;
      pointer-events: none;
      color: transparent;
      word-break: break-word;
      box-sizing: border-box;
      border: none;
      margin: 0;
    }
    mark.input-highlight {
      background: rgba(245,158,11,.3);
      color: transparent;
      border-radius: 2px;
    }
    mark.input-highlight.current {
      background: rgba(245,158,11,.7);
      outline: 1px solid rgba(245,158,11,.9);
    }

    /* ── Path Picker syntax colours ── */
    .j-str    { color: #86efac; cursor: pointer; border-radius: 2px; }
    .j-num    { color: #93c5fd; cursor: pointer; border-radius: 2px; }
    .j-bool   { color: #fbbf24; cursor: pointer; border-radius: 2px; }
    .j-null   { color: #a78bfa; cursor: pointer; border-radius: 2px; }
    .j-key    { color: #f0abfc; cursor: pointer; border-radius: 2px; }
    .j-bracket{ color: var(--text-muted); }
    .j-punct  { color: var(--text-muted); }
    .j-str:hover, .j-num:hover, .j-bool:hover, .j-null:hover, .j-key:hover {
      background: rgba(255,255,255,.1);
      outline: 1px solid rgba(255,255,255,.2);
    }
    #rawModeBtn.active {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    /* ── Light mode tree overrides ── */
    body.light .j-str  { color: #15803d; }
    body.light .j-num  { color: #1d4ed8; }
    body.light .j-bool { color: #b45309; }
    body.light .j-null { color: #7c3aed; }
    body.light .j-key  { color: #9d174d; }
    body.light .j-bracket, body.light .j-punct { color: var(--text-muted); }
    body.light .tree-details > .tree-summary:hover { background: rgba(0,0,0,.04); }
    body.light .tree-row:hover { background: rgba(0,0,0,.03); }
    body.light .tree-children { border-left-color: rgba(0,0,0,.08); }
    body.light .input-backdrop { background: transparent; }

    /* ── Tree output ── */
    #output.tree-mode { white-space: normal; }
    .tree-details { display: block; }
    .tree-details > .tree-summary {
      cursor: pointer;
      list-style: none;
      display: block;
      padding: 1px 4px;
      margin: 0 -4px;
      border-radius: 3px;
      transition: background 0.1s;
    }
    .tree-details > .tree-summary::-webkit-details-marker { display: none; }
    .tree-details > .tree-summary::marker { display: none; }
    .tree-details > .tree-summary:hover { background: rgba(255,255,255,.05); }
    .tree-caret {
      display: inline-block;
      width: 14px;
      font-size: 0.65em;
      color: var(--text-muted);
      vertical-align: middle;
      transition: transform 0.12s;
      user-select: none;
    }
    .tree-caret::before { content: '\25BA'; }
    .tree-details[open] > .tree-summary .tree-caret { transform: rotate(90deg); }
    .tree-closed-hint { display: none; color: var(--text-muted); font-size: 0.82em; }
    .tree-details:not([open]) .tree-closed-hint { display: inline; }
    .tree-children {
      padding-left: 1.4em;
      border-left: 1px solid rgba(255,255,255,.07);
      margin-left: 0.45em;
    }
    .tree-tail { padding: 1px 4px; margin: 0 -4px; }
    .tree-row  { padding: 1px 4px; margin: 0 -4px; }
    .tree-row:hover { background: rgba(255,255,255,.03); border-radius: 3px; }

    /* ── Drag-and-drop overlay ── */
    .drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(91,106,240,.18);
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      z-index: 20;
      pointer-events: none;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .drop-overlay.active { display: flex; }
    .input-wrapper { position: relative; }

    /* ── URL modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 22px;
      min-width: 420px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal h2 { font-size: 1rem; font-weight: 700; }
    .modal input[type=url], .modal input[type=text] {
      width: 100%;
      padding: 9px 13px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.88rem;
      font-family: var(--font-mono);
      outline: none;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-hint { font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">{ }</div>
  <h1>JSON Tools <span>— All In One JSON</span></h1>
  <div class="header-spacer"></div>
  <button id="themeToggle" class="btn-ghost btn-sm" onclick="toggleTheme()" title="Toggle light / dark mode">&#127769;</button>
</header>

<main>
  <!-- Editors with middle action buttons -->
  <div class="editors">

    <!-- Input pane -->
    <div class="pane">
      <div class="pane-header">
        <span class="dot yellow"></span>
        Input
        <span class="line-count" id="inputLines"></span>
        <div class="pane-actions">
          <button class="btn-ghost btn-sm" onclick="openUrlModal()" title="Fetch JSON from URL">&#127760; URL</button>
          <button class="btn-ghost btn-sm" onclick="document.getElementById('fileInput').click()" title="Upload .json file">&#128193; Upload</button>
          <button class="btn-ghost btn-sm" onclick="toggleInputFind()" title="Find &amp; Replace (Ctrl+H)">&#128269; Find</button>
          <button class="btn-ghost btn-sm" onclick="loadSample()">Load sample</button>
          <button class="btn-danger btn-sm" onclick="clearInput()" title="Clear input">&#10005; Clear</button>
        </div>
        <input type="file" id="fileInput" accept=".json,application/json,text/plain" style="display:none" onchange="handleFileUpload(event)" />
      </div>
      <div class="find-bar" id="inputFindBar">
        <label>Find</label>
        <input type="text" id="inputFindInput" placeholder="Find…" autocomplete="off" spellcheck="false" oninput="countInputMatches()" onkeydown="onFindKeydown(event)" />
        <button class="btn-ghost btn-sm" onclick="findInputPrev()" title="Previous match (Shift+Enter)">&#8593;</button>
        <button class="btn-ghost btn-sm" onclick="findInputNext()" title="Next match (Enter)">&#8595;</button>
        <label>Replace</label>
        <input type="text" id="inputReplaceInput" placeholder="Replace with…" autocomplete="off" spellcheck="false" />
        <button class="btn-ghost btn-sm" onclick="replaceNext()">Replace</button>
        <button class="btn-primary btn-sm" onclick="replaceAll()">Replace All</button>
        <span class="find-count" id="inputFindCount"></span>
        <button class="btn-danger btn-sm" onclick="toggleInputFind()">&#10005;</button>
      </div>
      <div class="input-wrapper" id="inputWrapper">
        <div class="drop-overlay" id="dropOverlay">Drop .json file here</div>
        <div class="input-backdrop" id="inputBackdrop"></div>
        <textarea id="input" spellcheck="false" placeholder='Paste your JSON here…&#10;&#10;{"name":"Alice","age":30}'
          oninput="onInputChange()" onscroll="syncBackdropScroll()"></textarea>
      </div>
    </div>

    <!-- Middle action buttons -->
    <div class="middle-actions">
      <button class="btn-indigo"  onclick="prettify()"      title="Format (Ctrl+Enter)">&#9654; Prettify</button>
      <button class="btn-sky"     onclick="minify()"        title="Minify (Ctrl+M)">&#9670; Minify</button>
      <button class="btn-emerald" onclick="validate()"      title="Validate">&#10003; Validate</button>
      <button class="btn-amber"   onclick="escapeJson()"    title="Escape special chars">&#10092; Escape</button>
      <button class="btn-orange"  onclick="unescapeJson()"  title="Unescape \\n \\t etc.">&#10093; Unescape</button>
      <button class="btn-purple"  onclick="stringify()"     title="Stringify">&#10087; Stringify</button>
      <button class="btn-pink"    onclick="repairJson()"    title="Auto-fix trailing commas, single quotes, unquoted keys">&#10024; Fix / Repair</button>
      <div class="divider"></div>
      <button class="btn-teal"    onclick="swapPanes()"     title="Move output &#8594; input">&#8646; Swap</button>
    </div>

    <!-- Output pane -->
    <div class="pane">
      <div class="pane-header">
        <span class="dot green" id="outputDot"></span>
        Output
        <span class="line-count" id="outputLines"></span>
        <div class="pane-actions">
          <button id="rawModeBtn" class="btn-ghost btn-sm" onclick="toggleRawMode()" title="Switch to raw text">&#128220; Raw</button>
          <button class="btn-ghost btn-sm" onclick="toggleOutputFind()" title="Find in output">&#128269; Find</button>
          <button class="btn-ghost btn-sm" onclick="downloadOutput()" title="Download as .json">&#11015; Download</button>
          <button class="btn-ghost btn-sm" onclick="copyOutput()">&#128203; Copy</button>
        </div>
      </div>
      <div class="find-bar" id="outputFindBar">
        <label>Find</label>
        <input type="text" id="outputFindInput" placeholder="Find in output…" autocomplete="off" spellcheck="false" oninput="renderOutputHighlights()" />
        <span class="find-count" id="outputFindCount"></span>
        <button class="btn-danger btn-sm" onclick="toggleOutputFind()">&#10005;</button>
      </div>
      <pre class="output-area" id="output"></pre>
    </div>

  </div>
</main>

<!-- Status bar -->
<div class="status-bar">
  <span id="statusMsg">Ready</span>
  <div class="spacer"></div>
  <span id="charCount">0 chars</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- URL Modal -->
<div class="modal-backdrop" id="urlModal" onclick="closeUrlModal(event)">
  <div class="modal">
    <h2>&#127760; Fetch JSON from URL</h2>
    <input type="url" id="urlInput" placeholder="https://api.example.com/data.json"
      spellcheck="false" autocomplete="off" onkeydown="if(event.key==='Enter')fetchUrl();if(event.key==='Escape')closeUrlModal()" />
    <p class="modal-hint">The URL must return JSON and support CORS, or use a public endpoint.</p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeUrlModal()">Cancel</button>
      <button class="btn-primary" onclick="fetchUrl()">&#9654; Fetch</button>
    </div>
  </div>
</div>

<script>
  const inputEl   = document.getElementById('input');
  const outputEl  = document.getElementById('output');
  const statusEl  = document.getElementById('statusMsg');
  const charCount = document.getElementById('charCount');
  const inputLines  = document.getElementById('inputLines');
  const outputLines = document.getElementById('outputLines');
  const outputDot   = document.getElementById('outputDot');

  let _outputRaw = '';
  let _inputFindMatches = [];
  let _inputFindIdx = -1;
  let _rawMode = false;

  /* ── helpers ── */
  function setStatus(msg, type = 'info') {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function setOutput(text, isError = false) {
    _outputRaw = text;
    outputEl.style.color = isError ? 'var(--error)' : '';
    outputDot.className = 'dot ' + (isError ? 'red' : (text ? 'green' : ''));
    outputLines.textContent = text ? countLines(text) + ' lines' : '';
    const outputFindBar = document.getElementById('outputFindBar');
    if (text && outputFindBar.classList.contains('visible')) {
      renderOutputHighlights();
    } else if (text && !isError && !_rawMode) {
      renderTree();
    } else {
      outputEl.classList.remove('tree-mode');
      outputEl.textContent = text;
    }
  }

  function countLines(str) {
    return (str.match(/\n/g) || []).length + 1;
  }

  function getInput() {
    return inputEl.value;
  }

  function tryParse(str) {
    return JSON.parse(str); // throws on invalid
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function onInputChange() {
    const v = inputEl.value;
    charCount.textContent = v.length.toLocaleString() + ' chars';
    inputLines.textContent = v ? countLines(v) + ' lines' : '';
    setStatus('Ready', 'info');
  }

  /* ── operations ── */

  // 1. Prettify — parse then re-stringify with indent
  function prettify() {
    const raw = getInput().trim();
    if (!raw) { setStatus('Nothing to prettify.', 'err'); return; }
    try {
      const parsed = tryParse(raw);
      const pretty = JSON.stringify(parsed, null, 2);
      setOutput(pretty);
      setStatus('Prettified successfully ✓', 'ok');
    } catch (e) {
      setOutput('Error: ' + e.message, true);
      setStatus('Invalid JSON — ' + e.message, 'err');
    }
  }

  // 2. Minify — parse then re-stringify without spaces
  function minify() {
    const raw = getInput().trim();
    if (!raw) { setStatus('Nothing to minify.', 'err'); return; }
    try {
      const parsed = tryParse(raw);
      setOutput(JSON.stringify(parsed));
      setStatus('Minified successfully ✓', 'ok');
    } catch (e) {
      setOutput('Error: ' + e.message, true);
      setStatus('Invalid JSON — ' + e.message, 'err');
    }
  }

  // 3. Validate — check & report
  function validate() {
    const raw = getInput().trim();
    if (!raw) { setStatus('Nothing to validate.', 'err'); return; }
    try {
      const parsed = tryParse(raw);
      const type = Array.isArray(parsed) ? 'Array' : typeof parsed;
      const keys = (typeof parsed === 'object' && parsed !== null && !Array.isArray(parsed))
        ? Object.keys(parsed).length + ' keys'
        : (Array.isArray(parsed) ? parsed.length + ' items' : '');
      const detail = [type, keys].filter(Boolean).join(' · ');
      setOutput('✓  Valid JSON\n\nType   : ' + type + '\n' +
        (keys ? 'Count  : ' + keys + '\n' : '') +
        'Length : ' + raw.length + ' chars\n\n' +
        '— Pretty-print preview —\n\n' + JSON.stringify(parsed, null, 2));
      setStatus('Valid JSON ✓  ' + detail, 'ok');
    } catch (e) {
      // Try to locate the error position
      const msg = e.message;
      const posMatch = msg.match(/position (\d+)/i);
      let hint = '';
      if (posMatch) {
        const pos = parseInt(posMatch[1]);
        const before = raw.substring(Math.max(0, pos - 20), pos);
        const after  = raw.substring(pos, pos + 20);
        hint = '\n\nNear: …' + before + ' ← HERE → ' + after + '…';
      }
      setOutput('✗  Invalid JSON\n\n' + msg + hint, true);
      setStatus('Invalid JSON ✗', 'err');
    }
  }

  // 4. Escape — escape special chars so JSON can be embedded in a string
  function escapeJson() {
    const raw = getInput();
    if (!raw) { setStatus('Nothing to escape.', 'err'); return; }
    const escaped = raw
      .replace(/\\/g, '\\\\')
      .replace(/"/g,  '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\t/g, '\\t')
      .replace(/\f/g, '\\f')
      .replace(/[\b]/g, '\\b');
    setOutput(escaped);
    setStatus('Escaped successfully ✓', 'ok');
  }

  // 5. Unescape — reverse of escape
  function unescapeJson() {
    const raw = getInput();
    if (!raw) { setStatus('Nothing to unescape.', 'err'); return; }
    try {
      // Use JSON.parse on a quoted string to unescape safely
      const unescaped = JSON.parse('"' + raw.replace(/^"|"$/g, '') + '"');
      setOutput(unescaped);
      setStatus('Unescaped successfully ✓', 'ok');
    } catch {
      // Fallback manual unescape
      try {
        const manual = raw
          .replace(/\\n/g,  '\n')
          .replace(/\\r/g,  '\r')
          .replace(/\\t/g,  '\t')
          .replace(/\\f/g,  '\f')
          .replace(/\\b/g,  '\b')
          .replace(/\\"/g,  '"')
          .replace(/\\\\/g, '\\');
        setOutput(manual);
        setStatus('Unescaped successfully ✓', 'ok');
      } catch (e) {
        setOutput('Error: ' + e.message, true);
        setStatus('Could not unescape — ' + e.message, 'err');
      }
    }
  }

  // 6. Stringify — turn JSON into a single-line escaped string literal
  function stringify() {
    const raw = getInput().trim();
    if (!raw) { setStatus('Nothing to stringify.', 'err'); return; }
    try {
      // Parse first to validate, then double-serialize (becomes a JSON string)
      const parsed = tryParse(raw);
      const stringified = JSON.stringify(JSON.stringify(parsed));
      setOutput(stringified);
      setStatus('Stringified successfully ✓', 'ok');
    } catch {
      // Even if not valid JSON, still stringify the raw text
      const stringified = JSON.stringify(raw);
      setOutput(stringified);
      setStatus('Stringified raw text ✓', 'ok');
    }
  }

  /* ── utility actions ── */
  async function copyOutput() {
    const text = _outputRaw || outputEl.textContent;
    if (!text) { showToast('Nothing to copy'); return; }
    try {
      await navigator.clipboard.writeText(text);
      showToast('Copied to clipboard!');
    } catch {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied!');
    }
  }

  function swapPanes() {
    const out = _outputRaw;
    if (!out) { showToast('Output is empty'); return; }
    inputEl.value = out;
    _outputRaw = '';
    outputEl.textContent = '';
    outputLines.textContent = '';
    outputDot.className = 'dot';
    setStatus('Swapped output → input', 'info');
    onInputChange();
    showToast('Output moved to input');
  }

  function clearInput() {
    inputEl.value = '';
    _inputFindMatches = [];
    _inputFindIdx = -1;
    document.getElementById('inputFindCount').textContent = '';
    document.getElementById('inputFindInput').value = '';
    charCount.textContent = '0 chars';
    inputLines.textContent = '';
    setStatus('Input cleared', 'info');
  }

  function clearOutput() {
    _outputRaw = '';
    outputEl.textContent = '';
    outputEl.innerHTML = '';
    outputEl.style.color = '';
    outputLines.textContent = '';
    outputDot.className = 'dot';
    document.getElementById('outputFindCount').textContent = '';
    document.getElementById('outputFindInput').value = '';
    setStatus('Output cleared', 'info');
  }

  function clearAll() {
    inputEl.value = '';
    _outputRaw = '';
    outputEl.textContent = '';
    outputEl.style.color = '';
    setStatus('Ready', 'info');
    charCount.textContent = '0 chars';
    inputLines.textContent = '';
    outputLines.textContent = '';
    outputDot.className = 'dot';
  }

  function loadSample() {
    inputEl.value = JSON.stringify({
      "name": "Gyana Mohapatra",
      "age": 29,
      "active": true,
      "score": 98.6,
      "address": {
        "street": "123 Main St",
        "city": "Bengaluru",
        "zip": "62701"
      },
      "tags": ["developer", "json-lover", "open-source"],
      "notes": "Hello World!\nThis is a sample JSON with various data types.\nFeel free to edit and test the tools!",
      "metadata": null
    }, null, 2);
    onInputChange();
    setStatus('Sample loaded ✓', 'ok');
    showToast('Sample JSON loaded');
  }

  /* ── input find & replace ── */
  function toggleInputFind() {
    const bar = document.getElementById('inputFindBar');
    const isVisible = bar.classList.toggle('visible');
    if (isVisible) {
      document.getElementById('inputFindInput').focus();
    } else {
      document.getElementById('inputFindCount').textContent = '';
      document.getElementById('inputBackdrop').innerHTML = '';
      _inputFindMatches = [];
      _inputFindIdx = -1;
    }
  }

  function countInputMatches() {
    const find = document.getElementById('inputFindInput').value;
    const countEl = document.getElementById('inputFindCount');
    _inputFindMatches = [];
    _inputFindIdx = -1;
    if (!find) { countEl.textContent = ''; renderInputHighlights(); return; }
    const text = inputEl.value;
    const textLower = text.toLowerCase();
    const findLower = find.toLowerCase();
    let pos = 0;
    while (true) {
      const idx = textLower.indexOf(findLower, pos);
      if (idx === -1) break;
      _inputFindMatches.push(idx);
      pos = idx + findLower.length;
    }
    const count = _inputFindMatches.length;
    if (count === 0) { countEl.textContent = 'No matches'; renderInputHighlights(); return; }
    _inputFindIdx = 0;
    selectInputMatch(find);
  }

  function selectInputMatch(find) {
    if (_inputFindMatches.length === 0) return;
    const findStr = find || document.getElementById('inputFindInput').value;
    const start = _inputFindMatches[_inputFindIdx];
    const end = start + findStr.length;
    inputEl.setSelectionRange(start, end);
    const textBefore = inputEl.value.substring(0, start);
    const lineNum = (textBefore.match(/\n/g) || []).length;
    const lineHeight = parseFloat(getComputedStyle(inputEl).lineHeight) || 24;
    inputEl.scrollTop = Math.max(0, lineNum * lineHeight - inputEl.clientHeight / 2);
    document.getElementById('inputFindCount').textContent =
      (_inputFindIdx + 1) + ' / ' + _inputFindMatches.length;
    renderInputHighlights();
  }

  function renderInputHighlights() {
    const backdrop = document.getElementById('inputBackdrop');
    const find = document.getElementById('inputFindInput').value;
    if (!find || _inputFindMatches.length === 0) { backdrop.innerHTML = ''; return; }
    const text = inputEl.value;
    let html = '';
    let pos = 0;
    for (let i = 0; i < _inputFindMatches.length; i++) {
      const start = _inputFindMatches[i];
      html += escapeHtml(text.substring(pos, start));
      const matchText = escapeHtml(text.substring(start, start + find.length));
      html += '<mark class="input-highlight' + (i === _inputFindIdx ? ' current' : '') + '">' + matchText + '</mark>';
      pos = start + find.length;
    }
    html += escapeHtml(text.substring(pos));
    backdrop.innerHTML = html;
    syncBackdropScroll();
  }

  function syncBackdropScroll() {
    const backdrop = document.getElementById('inputBackdrop');
    backdrop.scrollTop  = inputEl.scrollTop;
    backdrop.scrollLeft = inputEl.scrollLeft;
  }

  function findInputNext() {
    if (_inputFindMatches.length === 0) { countInputMatches(); return; }
    _inputFindIdx = (_inputFindIdx + 1) % _inputFindMatches.length;
    selectInputMatch();
  }

  function findInputPrev() {
    if (_inputFindMatches.length === 0) { countInputMatches(); return; }
    _inputFindIdx = (_inputFindIdx - 1 + _inputFindMatches.length) % _inputFindMatches.length;
    selectInputMatch();
  }

  function onFindKeydown(e) {
    if (e.key === 'Enter')  { e.preventDefault(); e.shiftKey ? findInputPrev() : findInputNext(); }
    if (e.key === 'Escape') { e.preventDefault(); toggleInputFind(); }
  }

  function replaceAll() {
    const find    = document.getElementById('inputFindInput').value;
    const replace = document.getElementById('inputReplaceInput').value;
    const countEl = document.getElementById('inputFindCount');
    if (!find) { showToast('Enter a search term'); return; }
    const text  = inputEl.value;
    const escapedFind = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(escapedFind, 'gi');
    const count = (text.match(regex) || []).length;
    if (count === 0) {
      countEl.textContent = 'No matches';
      showToast('No matches found');
      return;
    }
    inputEl.value = text.replace(regex, replace);
    onInputChange();
    _inputFindMatches = [];
    _inputFindIdx = -1;
    countEl.textContent = count + ' replaced';
    setStatus('Replaced ' + count + ' occurrence' + (count !== 1 ? 's' : '') + ' ✓', 'ok');
    showToast('Replaced ' + count + ' occurrence' + (count !== 1 ? 's' : ''));
  }

  function replaceNext() {
    const find    = document.getElementById('inputFindInput').value;
    const replace = document.getElementById('inputReplaceInput').value;
    if (!find) { showToast('Enter a search term'); return; }
    if (_inputFindMatches.length === 0) countInputMatches();
    if (_inputFindMatches.length === 0) { showToast('No match found'); return; }
    const idx = _inputFindMatches[_inputFindIdx];
    inputEl.value = inputEl.value.substring(0, idx) + replace + inputEl.value.substring(idx + find.length);
    onInputChange();
    countInputMatches();
    setStatus('Replaced 1 occurrence ✓', 'ok');
  }

  /* ── output find ── */
  function toggleOutputFind() {
    const bar = document.getElementById('outputFindBar');
    const isVisible = bar.classList.toggle('visible');
    if (isVisible) {
      document.getElementById('outputFindInput').focus();
    } else {
      document.getElementById('outputFindCount').textContent = '';
      if (_rawMode) {
        outputEl.classList.remove('tree-mode');
        outputEl.textContent = _outputRaw;
      } else {
        renderTree();
      }
    }
  }

  function renderOutputHighlights() {
    const find    = document.getElementById('outputFindInput').value;
    const countEl = document.getElementById('outputFindCount');
    if (!find || !_outputRaw) {
      outputEl.textContent = _outputRaw;
      countEl.textContent = '';
      return;
    }
    const escapedFindForRegex = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const count = (_outputRaw.match(new RegExp(escapedFindForRegex, 'gi')) || []).length;
    if (count === 0) {
      outputEl.textContent = _outputRaw;
      countEl.textContent = 'No matches';
      return;
    }
    outputEl.classList.remove('tree-mode');
    const escapedText = escapeHtml(_outputRaw);
    const escapedFindHtml = escapeHtml(find).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    outputEl.innerHTML = escapedText.replace(new RegExp(escapedFindHtml, 'gi'), '<mark class="highlight">$&</mark>');
    countEl.textContent = count + ' match' + (count !== 1 ? 'es' : '');
    const firstMark = outputEl.querySelector('mark.highlight');
    if (firstMark) firstMark.scrollIntoView({ block: 'nearest' });
  }

  /* ── Fix / Repair ── */
  function repairJson() {
    const raw = getInput().trim();
    if (!raw) { setStatus('Nothing to repair.', 'err'); return; }
    try {
      const parsed = JSON.parse(raw);
      setOutput(JSON.stringify(parsed, null, 2));
      setStatus('Already valid — prettified ✓', 'ok');
      showToast('JSON is already valid');
      return;
    } catch {}

    let fixed = raw;
    const fixes = [];

    // String-aware comment stripper — skips // and /* */ inside quoted strings
    // so URLs like "http://example.com" are never mangled
    function stripComments(s) {
      let out = '', i = 0;
      while (i < s.length) {
        if (s[i] === '"') {                                        // double-quoted string
          out += s[i++];
          while (i < s.length) {
            if (s[i] === '\\' && i + 1 < s.length) { out += s[i++]; out += s[i++]; }
            else if (s[i] === '"') { out += s[i++]; break; }
            else out += s[i++];
          }
        } else if (s[i] === "'") {                                 // single-quoted string
          out += s[i++];
          while (i < s.length) {
            if (s[i] === '\\' && i + 1 < s.length) { out += s[i++]; out += s[i++]; }
            else if (s[i] === "'") { out += s[i++]; break; }
            else out += s[i++];
          }
        } else if (s[i] === '/' && s[i + 1] === '/') {            // line comment
          while (i < s.length && s[i] !== '\n') i++;
        } else if (s[i] === '/' && s[i + 1] === '*') {            // block comment
          i += 2;
          while (i < s.length && !(s[i] === '*' && s[i + 1] === '/')) i++;
          if (i < s.length) i += 2;
        } else {
          out += s[i++];
        }
      }
      return out;
    }

    // Apply one repair step; if the result parses, emit output and return true
    function applyStep(next, label) {
      if (next === fixed) return false;          // no change — skip
      fixed = next;
      fixes.push(label);
      try {
        const p = JSON.parse(fixed);
        setOutput(JSON.stringify(p, null, 2));
        setStatus('Fixed: ' + fixes.join(', ') + ' ✓', 'ok');
        showToast('Repaired: ' + fixes.join(', '));
        return true;
      } catch { return false; }
    }

    // Steps run in order; each operates on the already-patched `fixed`
    if (applyStep(stripComments(fixed), 'removed comments')) return;
    if (applyStep(fixed.replace(/,(\s*[\}\]])/g, '$1'), 'removed trailing commas')) return;
    if (applyStep(fixed.replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g, '$1"$2":'), 'quoted unquoted keys')) return;
    if (applyStep(fixed.replace(/'([^'\\]*(\\.[^'\\]*)*)'/g, (_, c) =>
        '"' + c.replace(/\\'/g, "'").replace(/"/g, '\\"') + '"'), 'replaced single quotes')) return;
    if (applyStep(
        fixed.replace(/\bundefined\b/g, 'null').replace(/\bNaN\b/g, 'null').replace(/-?Infinity\b/g, 'null'),
        'replaced undefined/NaN/Infinity')) return;

    // All steps applied — do a final parse to capture the error message
    try {
      const p = JSON.parse(fixed);
      setOutput(JSON.stringify(p, null, 2));
      setStatus((fixes.length ? 'Fixed: ' + fixes.join(', ') : 'No fixes needed') + ' ✓', 'ok');
      showToast(fixes.length ? 'Repaired: ' + fixes.join(', ') : 'Already valid');
    } catch (e) {
      setOutput('⚠ Could not fully repair.\nApplied: ' + (fixes.length ? fixes.join(', ') : 'none') +
        '\n\nRemaining error: ' + e.message + '\n\n— Partial result —\n' + fixed, true);
      setStatus('Partial repair — ' + e.message, 'err');
    }
  }

  /* ── Tree view ── */
  function toggleRawMode() {
    _rawMode = !_rawMode;
    const btn = document.getElementById('rawModeBtn');
    btn.classList.toggle('active', _rawMode);
    btn.textContent = _rawMode ? '\uD83C\uDF32 Tree' : '\uD83D\uDCDC Raw';
    if (_rawMode) {
      outputEl.classList.remove('tree-mode');
      outputEl.textContent = _outputRaw;
    } else {
      renderTree();
    }
  }

  function renderTree() {
    if (!_outputRaw) return;
    try {
      const parsed = JSON.parse(_outputRaw);
      outputEl.classList.add('tree-mode');
      outputEl.innerHTML = buildTreeNode(parsed, '$', '', true);
    } catch {
      outputEl.classList.remove('tree-mode');
      outputEl.textContent = _outputRaw;
    }
  }

  function escapeAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function jsonSpan(text, cls, path) {
    const p = escapeAttr(path);
    return '<span class="' + cls + '" data-path="' + p + '" onclick="pickPath(this,event)" title="\uD83D\uDCCB ' + p + '">' + text + '</span>';
  }

  // Builds HTML for one JSON node. keyHtml = pre-built key HTML ('' for root/array items).
  function buildTreeNode(val, path, keyHtml, isLast) {
    const comma = isLast ? '' : '<span class="j-punct">,</span>';

    if (val === null)
      return '<div class="tree-row">' + keyHtml + jsonSpan('null',              'j-null', path) + comma + '</div>';
    if (typeof val === 'boolean')
      return '<div class="tree-row">' + keyHtml + jsonSpan(String(val),         'j-bool', path) + comma + '</div>';
    if (typeof val === 'number')
      return '<div class="tree-row">' + keyHtml + jsonSpan(String(val),         'j-num',  path) + comma + '</div>';
    if (typeof val === 'string')
      return '<div class="tree-row">' + keyHtml + jsonSpan(escapeHtml(JSON.stringify(val)), 'j-str', path) + comma + '</div>';

    const isArr  = Array.isArray(val);
    const ob     = isArr ? '[' : '{';
    const cb     = isArr ? ']' : '}';
    const keys   = isArr ? null : Object.keys(val);
    const count  = isArr ? val.length : keys.length;

    if (count === 0)
      return '<div class="tree-row">' + keyHtml + '<span class="j-bracket">' + ob + cb + '</span>' + comma + '</div>';

    const hint  = count + '\u00a0' + (isArr ? (count === 1 ? 'item' : 'items') : (count === 1 ? 'key' : 'keys'));
    const items = isArr ? val : keys;

    const childrenHtml = items.map((item, i) => {
      const k         = isArr ? i : item;
      const v         = isArr ? item : val[item];
      const childPath = isArr
        ? path + '[' + k + ']'
        : (/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(String(k))
            ? path + '.' + k
            : path + '["' + String(k).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]');
      const childKey  = isArr ? '' : (jsonSpan(escapeHtml(JSON.stringify(k)), 'j-key', childPath) + '<span class="j-punct">: </span>');
      return buildTreeNode(v, childPath, childKey, i === count - 1);
    }).join('');

    return '<details class="tree-details" open>' +
      '<summary class="tree-summary">' +
        '<span class="tree-caret"></span>' +
        keyHtml +
        '<span class="j-bracket">' + ob + '</span>' +
        '<span class="tree-closed-hint">\u2009' + escapeHtml(hint) + '\u2009<span class="j-bracket">' + cb + '</span></span>' +
      '</summary>' +
      '<div class="tree-children">' + childrenHtml + '</div>' +
      '<div class="tree-tail"><span class="j-bracket">' + cb + '</span>' + comma + '</div>' +
      '</details>';
  }

  function pickPath(el, e) {
    if (e) e.stopPropagation();
    const path = el.dataset.path;
    navigator.clipboard.writeText(path)
      .then(() => showToast('Copied: ' + path))
      .catch(() => showToast('Path: ' + path));
  }

  /* ── Load from URL ── */
  function openUrlModal() {
    document.getElementById('urlModal').classList.add('open');
    setTimeout(() => document.getElementById('urlInput').focus(), 50);
  }

  function closeUrlModal(e) {
    if (e && e.target !== document.getElementById('urlModal')) return;
    document.getElementById('urlModal').classList.remove('open');
  }

  async function fetchUrl() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showToast('Enter a URL'); return; }
    // Must be absolute http(s) URL
    if (!/^https?:\/\/.+/i.test(url)) { showToast('URL must start with http:// or https://'); return; }
    document.getElementById('urlModal').classList.remove('open');
    setStatus('Fetching…', 'info');
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 10000); // 10 s timeout
      const resp = await fetch(url, {
        signal: controller.signal,
        credentials: 'omit',    // never send cookies to third-party
        mode: 'cors'
      });
      clearTimeout(timer);
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
      // Refuse oversized responses (> 10 MB)
      const cl = resp.headers.get('content-length');
      if (cl && Number(cl) > 10 * 1024 * 1024) throw new Error('Response exceeds 10 MB limit');
      const text = await resp.text();
      if (text.length > 10 * 1024 * 1024) throw new Error('Response exceeds 10 MB limit');
      // Validate it's JSON before loading
      JSON.parse(text);
      inputEl.value = text;
      onInputChange();
      setStatus('Loaded from URL ✓', 'ok');
      showToast('JSON loaded from URL');
      document.getElementById('urlInput').value = '';
    } catch (e) {
      setStatus('Fetch failed — ' + e.message, 'err');
      showToast('Error: ' + e.message);
    }
  }

  /* ── File upload ── */
  function handleFileUpload(event) {
    const file = event.target.files[0];
    event.target.value = '';           // reset so same file can be re-uploaded
    if (!file) return;
    // 10 MB max for file upload
    if (file.size > 10 * 1024 * 1024) { showToast('File exceeds 10 MB limit'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      try { JSON.parse(text); } catch (e) {
        showToast('File is not valid JSON: ' + e.message);
        setStatus('Invalid JSON in file — ' + e.message, 'err');
        return;
      }
      inputEl.value = text;
      onInputChange();
      setStatus('File loaded: ' + file.name + ' ✓', 'ok');
      showToast('Loaded: ' + file.name);
    };
    reader.onerror = () => showToast('Could not read file');
    reader.readAsText(file);
  }

  /* ── Drag-and-drop ── */
  (function initDrop() {
    const wrapper = document.getElementById('inputWrapper');
    const overlay = document.getElementById('dropOverlay');
    let dragDepth = 0;

    wrapper.addEventListener('dragenter', e => {
      e.preventDefault();
      dragDepth++;
      if ([...e.dataTransfer.items].some(i => i.kind === 'file')) overlay.classList.add('active');
    });
    wrapper.addEventListener('dragleave', () => {
      dragDepth--;
      if (dragDepth <= 0) { dragDepth = 0; overlay.classList.remove('active'); }
    });
    wrapper.addEventListener('dragover', e => e.preventDefault());
    wrapper.addEventListener('drop', e => {
      e.preventDefault();
      dragDepth = 0;
      overlay.classList.remove('active');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (!file.name.endsWith('.json') && file.type !== 'application/json' && file.type !== 'text/plain') {
        showToast('Please drop a .json file');
        return;
      }
      const reader = new FileReader();
      reader.onload = ev => {
        const text = ev.target.result;
        try { JSON.parse(text); } catch (err) {
          showToast('File is not valid JSON: ' + err.message);
          setStatus('Invalid JSON in file — ' + err.message, 'err');
          return;
        }
        inputEl.value = text;
        onInputChange();
        setStatus('File loaded: ' + file.name + ' ✓', 'ok');
        showToast('Loaded: ' + file.name);
      };
      reader.readAsText(file);
    });
  })();

  /* ── Download output ── */
  function downloadOutput() {
    const text = _outputRaw;
    if (!text) { showToast('Nothing to download'); return; }
    const blob = new Blob([text], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'output.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Downloaded output.json');
  }

  /* ── Theme toggle ── */
  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    document.getElementById('themeToggle').textContent = isLight ? '\u2600\uFE0F' : '\uD83C\uDF19';
    try { localStorage.setItem('json-tools-theme', isLight ? 'light' : 'dark'); } catch {}
  }

  /* ── keyboard shortcuts ── */
  document.addEventListener('keydown', e => {
    const mod = e.ctrlKey || e.metaKey;
    if (!mod) return;
    if (e.key === 'Enter') { e.preventDefault(); prettify(); }
    if (e.key === 'm')     { e.preventDefault(); minify(); }
    if (e.key === 'k')     { e.preventDefault(); clearAll(); }
    if (e.key === 'h')     { e.preventDefault(); toggleInputFind(); }
  });

  // Init
  (function applyTheme() {
    try {
      if (localStorage.getItem('json-tools-theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeToggle').textContent = '\u2600\uFE0F';
      }
    } catch {}
  })();
  onInputChange();
</script>
</body>
